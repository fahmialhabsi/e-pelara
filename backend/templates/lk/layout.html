<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11pt;
      line-height: 1.5;
      color: #000;
      margin: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10pt;
    }
    table, th, td {
      border: 1px solid #000;
    }
    th, td {
      padding: 4px 6px;
      vertical-align: top;
    }
    th { background-color: #f0f0f0; text-align: center; font-weight: bold; }
    .text-right { text-align: right; }
    .text-center { text-align: center; }
    .bold { font-weight: bold; }
    .header-doc {
      text-align: center;
      margin-bottom: 20px;
    }
    .header-doc h1 { font-size: 14pt; margin: 0; }
    .header-doc h2 { font-size: 12pt; margin: 4px 0; }
    .no-border td, .no-border th { border: none; }
    .rupiah { text-align: right; white-space: nowrap; }
    .persen { text-align: center; }
    .total-row { font-weight: bold; background-color: #e8e8e8; }
    .kelompok-row { font-weight: bold; background-color: #d0d0d0; }
    .page-break { page-break-after: always; break-after: page; }
  </style>
</head>
<body>
  {{CONTENT}}
</body>
</html>
